<header class="topbar">
  <a class="brand" routerLink="/">
    <span class="brand-mark">M</span>
    <span>
      <strong>MargoMarket</strong>
      <small>rynek przedmiotów</small>
    </span>
  </a>

  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Ogłoszenia</a>
    <a routerLink="/dashboard" routerLinkActive="active">Moje ogłoszenia</a>
    <a routerLink="/favorites" routerLinkActive="active">Obserwowane</a>
    @if (user$ | async) {
      <a routerLink="/notifications" routerLinkActive="active">Powiadomienia</a>
    }
    <a routerLink="/new" routerLinkActive="active">Stwórz ogłoszenie</a>
    @if ((user$ | async)?.role === 'admin') {
      <a routerLink="/admin" routerLinkActive="active">Administracja</a>
    }
  </nav>

  @if (user$ | async; as user) {
    <div class="session">
      <span>{{ user.email }}</span>
      <button type="button" class="ghost-button" (click)="logout()">Wyloguj</button>
    </div>
  } @else {
    <a class="primary-link" routerLink="/auth">Zaloguj</a>
  }
</header>

<main>
  <router-outlet />
</main>
