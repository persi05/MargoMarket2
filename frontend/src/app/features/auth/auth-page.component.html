<section class="auth-page">
  <div class="copy">
    <p class="eyebrow">Konto gracza</p>
    <h1>{{ mode === 'login' ? 'Zaloguj się do MargoMarket' : 'Załóż konto w MargoMarket' }}</h1>
    <p>Po zalogowaniu możesz dodawać własne oferty, oznaczać sprzedane przedmioty i trzymać obserwowane ogłoszenia w jednym miejscu.</p>
    <a routerLink="/">Wróć do giełdy</a>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="tabs">
      <button type="button" [class.active]="mode === 'login'" (click)="switchMode('login')">Logowanie</button>
      <button type="button" [class.active]="mode === 'register'" (click)="switchMode('register')">Rejestracja</button>
    </div>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <label>
      E-mail
      <input type="email" formControlName="email" autocomplete="email">
    </label>

    <label>
      Hasło
      <input type="password" formControlName="password" autocomplete="current-password">
    </label>

    <button class="submit" type="submit" [disabled]="loading">
      {{ loading ? 'Przetwarzanie...' : (mode === 'login' ? 'Zaloguj' : 'Utwórz konto') }}
    </button>
  </form>
</section>
